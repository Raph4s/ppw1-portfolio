<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Tugas 2</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="container mt-5">

    <h1>Form Praktikan PPW1</h1>

    <button class="btn btn-primary" onclick="dataPraktikan()">
        Mulai
    </button>

    <div id="hasil" class="mt-4"></div>

    <script>

        function dataPraktikan() {

            // confirm
            let status = confirm("Apakah Anda mahasiswa PPW1?");

            // jika YA
            if (status) {

                // prompt
                let nama = prompt("Masukkan Nama:");
                let nim = prompt("Masukkan NIM:");
                let angkatan = prompt("Masukkan Angkatan:");

                // hitung tahun lulus
                let tahunSekarang = new Date().getFullYear();
                let tahunLulus = parseInt(angkatan) + 4;
                let sisa = tahunLulus - tahunSekarang;

                // cek genap ganjil
                let kategori;

                if (nim % 2 == 0) {
                    kategori = "Genap";
                } else {
                    kategori = "Ganjil";
                }

                // tampil tabel bootstrap
                document.getElementById("hasil").innerHTML = `
                
                <table class="table table-bordered">
                    <tr>
                        <th>Nama</th>
                        <td>${nama}</td>
                    </tr>

                    <tr>
                        <th>NIM</th>
                        <td>${nim}</td>
                    </tr>

                    <tr>
                        <th>Angkatan</th>
                        <td>${angkatan}</td>
                    </tr>

                    <tr>
                        <th>NIM</th>
                        <td>${kategori}</td>
                    </tr>

                    <tr>
                        <th>Lulus</th>
                        <td>${sisa} tahun lagi</td>
                    </tr>
                </table>

                `;
            }

            // jika TIDAK
            else {

                document.getElementById("hasil").innerHTML = `
                
                <div class="alert alert-danger">
                    Even LeBron aint a PPW student lil bro
                </div>

                `;
            }
        }

    </script>

</body>
</html>
