<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Interactive Components</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1 class="fade-in">Interactive Components</h1>

    <!-- BUTTONS -->
    <div class="buttons fade-in">
        <button class="btn btn1">Button 1</button>
        <button class="btn btn2">Button 2</button>
        <button class="btn btn3">Button 3</button>
    </div>

    <!-- LOADING SPINNER -->
    <div class="spinner"></div>

    <!-- CARD (BONUS) -->
    <div class="card-container">
        <div class="card">
            <div class="card-front">Front</div>
            <div class="card-back">Back</div>
        </div>
    </div>

</body>
</html>
