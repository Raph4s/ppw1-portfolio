<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Tabel HTML5 dengan Gambar Internet</title>
</head>
<body>

    <h4>Tabel dengan latar belakang gambar:</h4>
    <table border="1" style="background-image: 
    url('https://static.vecteezy.com/system/resources/thumbnails/057/068/323/small/single-fresh-red-strawberry-on-table-green-background-food-fruit-sweet-macro-juicy-plant-image-photo.jpg'); 
    color: white; width: 300px; height: 150px;">
        <tr>
            <td>Pertama</td>
            <td>Baris</td>
        </tr>
        <tr>
            <td>Kedua</td>
            <td>Baris</td>
        </tr>
    </table>

    <h4>Latar belakang gambar hanya pada sel tertentu:</h4>
    <table border="1" style="width: 300px; height: 150px;">
        <tr>
            <td style="background-color: red; color: white;">Warna Merah</td>
            <td>Baris Biasa</td>
        </tr>
        <tr>
            <td style="background-image: 
            url('https://static.vecteezy.com/system/resources/thumbnails/057/068/323/small/single-fresh-red-strawberry-on-table-green-background-food-fruit-sweet-macro-juicy-plant-image-photo.jpg'); 
            color: white;">
            </td>
            <td>Baris Biasa</td>
        </tr>
    </table>
</body>
</html>
