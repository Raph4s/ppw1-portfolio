<form oninput="result.value = parseInt(n1.value) + parseInt(n2.value)">
  <label for="n1">Number 1:</label>
  <input type="number" id="n1" name="n1" value="10">
  <label for="n2">Number 2:</label>
  <input type="number" id="n2" name="n2" value="20">
  <p>Ini Outputnya: <output name="result" for="n1 n2"></output></p>
</form>
