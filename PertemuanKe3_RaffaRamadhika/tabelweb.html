<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Navigasi Iframe dalam Tabel</title>
</head>
<body>

    <table style="border: 1px solid black; width: 100%; border-collapse: collapse;">
        <tr>
            <td style="border: 1px solid black; padding: 10px;">
                <a href="https://ugm.ac.id" target="iframe_target">Website UGM</a>
            </td>
            
            <td rowspan="2" style="border: 1px solid black; width: 80%;">
                <iframe src="https://ugm.ac.id" name="iframe_target" style="height: 500px; width: 100%; border: none;"></iframe>
            </td>
        </tr>
        <tr>

            <td style="border: 1px solid black; padding: 10px;">
                <a href="https://ugm.ac.id/id/fakultas/sekolah-vokasi/" target="iframe_target">Website Vokasi</a>
            </td>
        </tr>
    </table>

</body>
</html>
