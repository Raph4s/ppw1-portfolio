<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Tabel Kosong</title>
</head>
<body>

    <table border="1">
        <tr>
            <td>Teks</td>
            <td>Teks</td>
        </tr>
        <tr>
            <td>&nbsp;</td>
            <td>Teks</td>
        </tr>
    </table>

    <p>
        menggunakan entitas <b>&amp;nbsp;</b> untuk mengisi sel kosong 
        agar border-nya tetap terlihat oleh browser.
    </p>

</body>
</html>
