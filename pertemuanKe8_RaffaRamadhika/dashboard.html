<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div class="container mt-4">

<!-- Profile -->
<div class="card mb-3 p-3">
  <div class="d-flex align-items-center">
    <img src="https://via.placeholder.com/80" class="rounded-circle me-3">
    <div>
      <h5>Raffa</h5>
      <span class="badge bg-success">Aktif</span>
    </div>
  </div>
</div>

<!-- Stats -->
<div class="row text-center mb-3">
  <div class="col-md-4">
    <div class="card p-3">📚 SKS: 144</div>
  </div>
  <div class="col-md-4">
    <div class="card p-3">⭐ IPK: 3.9</div>
  </div>
  <div class="col-md-4">
    <div class="card p-3">✅ Lulus: 20</div>
  </div>
</div>

<!-- Table -->
<div class="table-responsive">
<table class="table table-bordered">
  <tr>
    <th>No</th>
    <th>Mata Kuliah</th>
    <th>SKS</th>
    <th>Huruf</th>
    <th>Angka</th>
    <th>Aksi</th>
  </tr>

  <tr>
    <td>1</td>
    <td>Web</td>
    <td>3</td>
    <td><span class="badge bg-success">A</span></td>
    <td>4.0</td>
    <td><button class="btn btn-primary btn-sm" data-bs-toggle="modal" data-bs-target="#modal1">Detail</button></td>
  </tr>

  <tr>
    <td>2</td>
    <td>DB</td>
    <td>3</td>
    <td><span class="badge bg-primary">B</span></td>
    <td>3.0</td>
    <td><button class="btn btn-primary btn-sm" data-bs-toggle="modal" data-bs-target="#modal1">Detail</button></td>
  </tr>

</table>
</div>

</div>

<!-- Modal -->
<div class="modal fade" id="modal1">
  <div class="modal-dialog">
    <div class="modal-content p-3">
      <h5>Detail Mata Kuliah</h5>
      <p>Informasi lengkap...</p>
      <button class="btn btn-secondary" data-bs-dismiss="modal">Tutup</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
