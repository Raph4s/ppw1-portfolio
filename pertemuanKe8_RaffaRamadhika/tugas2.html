<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tugas 2</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div class="container mt-4">

<h3>Form Pendaftaran</h3>

<!-- Alert (hidden) -->
<div class="alert alert-success alert-dismissible fade show d-none" id="alert">
  Data berhasil disimpan!
  <button class="btn-close" data-bs-dismiss="alert"></button>
</div>

<form>

  <!-- 2 kolom -->
  <div class="row">
    <div class="col-md-6 mb-3">
      <input type="text" class="form-control is-valid" placeholder="Nama Lengkap">
    </div>
    <div class="col-md-6 mb-3">
      <input type="text" class="form-control is-invalid" placeholder="NIM">
    </div>
  </div>

  <input type="email" class="form-control mb-3" placeholder="Email">

  <select class="form-control mb-3">
    <option>Program Studi</option>
    <option>Informatika</option>
  </select>

  <select class="form-control mb-3">
    <option>Semester</option>
    <option>1</option>
  </select>

  <textarea class="form-control mb-3" placeholder="Alamat"></textarea>

  <input type="file" class="form-control mb-3">

  <!-- Buttons -->
  <div class="d-flex gap-2">
    <button type="button" class="btn btn-success" onclick="showAlert()">Simpan</button>
    <button type="reset" class="btn btn-secondary">Reset</button>
  </div>

</form>
</div>

<script>
function showAlert() {
  document.getElementById("alert").classList.remove("d-none");
}
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
