<!DOCTYPE html>
<html>
<head>
    <title>text-indent</title>
    <style>
        .indent {
            text-indent: 40px;
            border: 1px solid black;
            padding: 10px;
        }
    </style>
</head>
<body>

<h2>Contoh text-indent</h2>
<p class="indent">
    Ini adalah contoh paragraf dengan indentasi pada baris pertama.
    Baris berikutnya tetap rata kiri.
</p>

</body>
</html>
